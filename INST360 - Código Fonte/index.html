<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:wght@300;400;600;700&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <title>Document</title>
</head>
<body>

    <div id="form-conteiner">
    <h2 id="form-title">Cadastro de Usuário</h2>
    <form id="formCadastro" action="conexao.php" method="POST">

        <!-- ID (auto_increment no banco) -->
        <input type="hidden" name="id" value="">

        <!-- Nome -->
        <input type="text" id="nome" name="nome" placeholder="Insira seu Nome" required>

        <!-- Matricula -->
        <input type="text" id="matricula" name="matricula" placeholder="Insira sua Matricula" required> 

        <!-- Endereço -->
        <input type="text" id="endereco" name="endereco" placeholder="Insira seu Endereço" required>

        <!-- Data de Nascimento -->
        <input type="date" id="data_nasc" name="data_nasc" placeholder="Insira sua Data de Nascimento" required>

        <!-- Email -->
        <input type="email" id="email" name="email" placeholder="Insira seu Email" required>

        <!-- Usuário Válido -->
        <input type="hidden" name="usuario_valido" value="0">

        <!-- Senha -->
        <input type="password" id="senha" name="senha" placeholder="Insira sua Senha" required>

        <button id="btnCadastro" type="submit">Cadastrar</button>
    </form>

        <label id="msgCadastro" class=""></label>
    </div>

    <script src="./js/script.js"></script>
</body>
</html>
